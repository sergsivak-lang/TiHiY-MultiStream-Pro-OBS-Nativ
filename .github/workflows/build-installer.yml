name: Build TiHiY Installer SAFE

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  installer:
    name: Create SAFE Setup.exe
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check payload DLL
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $dll = "installer\payload\obs-plugins\64bit\tihiy-multistream-pro.dll"

          if (-not (Test-Path $dll)) {
            throw "DLL not found: $dll"
          }

          Write-Host "Payload DLL found:"
          Write-Host $dll

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $isccCandidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 7\ISCC.exe"
          )

          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) {
              $iscc = $cmd.Source
            }
          }

          if (-not $iscc) {
            throw "ISCC.exe not found."
          }

          if (-not (Test-Path "installer\TiHiYMultiStreamPro.iss")) {
            throw "installer\TiHiYMultiStreamPro.iss not found."
          }

          Write-Host "Using Inno Setup:"
          Write-Host $iscc

          & $iscc "installer\TiHiYMultiStreamPro.iss"

      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-MultiStream-Pro-Setup-SAFE
          path: installer/output/*.exe
          if-no-files-found: error
