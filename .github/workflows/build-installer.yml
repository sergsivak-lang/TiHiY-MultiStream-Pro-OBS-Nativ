name: Build TiHiY Installer v2.3

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Optional: GitHub Actions run ID that contains tihiy-multistream-pro.dll"
        required: false
        type: string

  workflow_run:
    workflows: ["Push"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  installer:
    name: Create Setup.exe
    runs-on: windows-2022

    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Download Windows build artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path "downloaded_artifacts" | Out-Null

          $runId = ""

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $runId = "${{ github.event.inputs.run_id }}"
          }

          if ("${{ github.event_name }}" -eq "workflow_run") {
            $runId = "${{ github.event.workflow_run.id }}"
          }

          if ([string]::IsNullOrWhiteSpace($runId)) {
            Write-Host "No run_id provided. Searching latest successful Push run..."
            $runId = gh run list `
              --repo "${{ github.repository }}" `
              --workflow "Push" `
              --branch "master" `
              --status success `
              --limit 1 `
              --json databaseId `
              --jq '.[0].databaseId'
          }

          if ([string]::IsNullOrWhiteSpace($runId)) {
            throw "Could not find a successful Push workflow run."
          }

          Write-Host "Using build run ID: $runId"

          gh run download $runId `
            --repo "${{ github.repository }}" `
            --dir "downloaded_artifacts"

          Write-Host "Downloaded artifacts:"
          Get-ChildItem "downloaded_artifacts" -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Prepare installer payload
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $payload = "installer\payload"

          Remove-Item $payload -Recurse -Force -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path "$payload\obs-plugins\64bit" | Out-Null
          New-Item -ItemType Directory -Force -Path "$payload\data\obs-plugins\tihiy-multistream-pro" | Out-Null

          $dll = Get-ChildItem -Path "downloaded_artifacts" -Recurse -Filter "tihiy-multistream-pro.dll" | Select-Object -First 1

          if (-not $dll) {
            throw "tihiy-multistream-pro.dll not found in downloaded artifacts."
          }

          Write-Host "Found DLL:"
          Write-Host $dll.FullName

          Copy-Item $dll.FullName "$payload\obs-plugins\64bit\tihiy-multistream-pro.dll" -Force

          if (Test-Path "data") {
            Copy-Item "data\*" "$payload\data\obs-plugins\tihiy-multistream-pro" -Recurse -Force
          }

          Write-Host "Prepared installer payload:"
          Get-ChildItem $payload -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Compile installer with Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $isccCandidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 7\ISCC.exe"
          )

          $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            $cmd = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($cmd) {
              $iscc = $cmd.Source
            }
          }

          if (-not $iscc) {
            throw "ISCC.exe not found. Inno Setup installation failed."
          }

          if (-not (Test-Path "installer\TiHiYMultiStreamPro.iss")) {
            throw "installer\TiHiYMultiStreamPro.iss not found."
          }

          Write-Host "Using Inno Setup:"
          Write-Host $iscc

          & $iscc "installer\TiHiYMultiStreamPro.iss"

      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: TiHiY-MultiStream-Pro-Setup-v2.3
          path: installer/output/*.exe
          if-no-files-found: error
